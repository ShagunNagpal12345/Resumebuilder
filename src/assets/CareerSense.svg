<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 80" width="380" height="80">
  <defs>
    <clipPath id="clip-white">
      <rect x="155" y="0" height="80" class="white-typing-rect" />
    </clipPath>

    <clipPath id="clip-turquoise">
      <rect x="155" y="0" height="80" class="turquoise-typing-rect" />
    </clipPath>

    <style>
      /* 1. Blinking Cursor Animation */
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      
      /* 2. Deleting Mask Animation (Width of the White clip path) */
      /* This makes the White word vanish from full visibility */
      @keyframes type-delete-white {
        0%, 20% { width: 160px; }
        /* Fast backspacing (deleted in white) */
        22% { width: 128px; }
        24% { width: 96px; }
        26% { width: 64px; }
        28% { width: 32px; }
        30%, 100% { width: 0px; } /* Pause and remain vanished while empty */
      }

      /* 3. Rewriting Mask Animation (Width of the Turquoise clip path) */
      /* This makes the Turquoise word appear from no visibility */
      @keyframes type-delete-turquoise {
        0%, 60% { width: 0px; } /* Wait while deletion happens and during empty pause */
        /* Slower typing (getting re-written in turquoise) */
        65% { width: 32px; }
        70% { width: 64px; }
        75% { width: 96px; }
        80% { width: 128px; }
        85%, 100% { width: 160px; } /* Pause while full and remains written */
      }

      /* 4. Cursor Movement Animation (Matches text boundary from 0 to -160px and back) */
      @keyframes cursor-move {
        0%, 20% { transform: translateX(0px); }
        /* Fast backspacing (cursor moves left with deleted white text) */
        22% { transform: translateX(-32px); }
        24% { transform: translateX(-64px); }
        26% { transform: translateX(-96px); }
        28% { transform: translateX(-128px); }
        30%, 60% { transform: translateX(-160px); }
        /* Slower typing (cursor moves right with re-written turquoise text) */
        65% { transform: translateX(-128px); }
        70% { transform: translateX(-96px); }
        75% { transform: translateX(-64px); }
        80% { transform: translateX(-32px); }
        85%, 100% { transform: translateX(0px); }
      }

      .cursor { 
        animation: blink 0.8s step-end infinite; 
      }
      .white-typing-rect {
        animation: type-delete-white 6s infinite;
      }
      .turquoise-typing-rect {
        animation: type-delete-turquoise 6s infinite;
      }
      .cursor-group {
        animation: cursor-move 6s infinite;
      }

      /* Font Styling */
      .logo-text {
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        font-weight: 900; /* font-black */
        font-size: 42px;
        letter-spacing: -0.025em; /* tracking-tight */
      }
      .career { fill: #FFFFFF; /* White */ }
      .sense-white { fill: #FFFFFF; /* White */ }
      .sense-turquoise { fill: #40E0D0; /* Vibrant Turquoise */ }
      
      /* Underscore matches the Turquoise of rewriting and cursor itself */
      .underscore { fill: #40E0D0; }
    </style>
  </defs>

  <text x="15" y="55" class="logo-text career">Career</text>
  
  <text x="155" y="55" class="logo-text sense-white" clip-path="url(#clip-white)">Sense</text>
  
  <text x="155" y="55" class="logo-text sense-turquoise" clip-path="url(#clip-turquoise)">Sense</text>
  
  <g class="cursor-group">
    <text x="315" y="55" class="logo-text underscore cursor">_</text>
  </g>
</svg>
